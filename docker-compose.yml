version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: farmaciapopular-app
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - /var/www/html/logs
      - /var/www/html/uploads
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - APP_URL=http://localhost:8000
    restart: unless-stopped

volumes:
  logs:
  uploads:
